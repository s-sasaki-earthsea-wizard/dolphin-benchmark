# Run via `./run.sh`. The wrapper supplies `--env-file ../.env` so values from
# the repo-root .env feed BOTH compose-time path substitution AND the in-container
# environment. If you invoke `docker compose` directly, add `--env-file ../.env`.
#
# User-specific paths (DATA_DIR, OPERA_CSLC_DIR, ASF_USERNAME/ASF_PASSWORD) live
# in .env (gitignored) — see .env.example for the expected variables.
# Anything that is *not* user-specific (e.g. DOLPHIN_SRC defaulting to ../..)
# may have a default here.

services:
  dev:
    image: dolphin-benchmark:gpu
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Match host UID/GID so files created in mounts stay owner-correct.
        USER_ID: "${USER_ID:-1000}"
        GROUP_ID: "${GROUP_ID:-1000}"
        # Bump these to pick a different CUDA / Ubuntu base.
        CUDA_VERSION: "12.6.3"
        UBUNTU_VERSION: "22.04"
    # GPU passthrough — requires nvidia-container-toolkit on the host.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # ASF / NASA Earthdata credentials are passed in via .env at the
    # repo root (NOT in this directory). env_file loads values as-is —
    # no shell interpolation — so passwords with $ or other special chars
    # are safe. .env is git-ignored; do not commit it.
    env_file:
      - ../.env
    volumes:
      # dolphin source (rw, for `pip install -e .` and source edits).
      - "${DOLPHIN_SRC:-../..}:/dolphin:rw"
      # this benchmark repo (rw, for results and scratch).
      - "..:/dolphin-benchmark:rw"
      # SAR test data (ro). Set DATA_DIR in .env to your raw SAFE tree.
      - "${DATA_DIR:?DATA_DIR not set — copy .env.example to .env and fill it in}:/data:ro"
      # OPERA CSLC tutorial dataset (rw). Downloads land here so they persist
      # across container restarts. Set OPERA_CSLC_DIR in .env.
      - "${OPERA_CSLC_DIR:?OPERA_CSLC_DIR not set — copy .env.example to .env and fill it in}:/cslc:rw"
      # Per-run scratch (defaults to ../results on host).
      - "../results:/work:rw"
    working_dir: /work
    # tty + stdin for interactive shell; -i compose flag also needed (see README).
    tty: true
    stdin_open: true
    # Editable install runs once per container start. Fast no-op after the first time
    # because pip detects no changes.
    command: >
      bash -lc "
        pip install --no-deps --quiet -e /dolphin &&
        echo '--- dolphin-benchmark dev shell ---' &&
        echo 'dolphin source: /dolphin (editable)' &&
        echo 'benchmark repo: /dolphin-benchmark' &&
        echo 'data (ro):      /data' &&
        echo 'cslc (rw):      /cslc' &&
        echo 'workdir:        /work' &&
        echo &&
        nvidia-smi --query-gpu=name,memory.total --format=csv,noheader 2>/dev/null | sed 's/^/GPU: /' &&
        python -c 'import jax; print(\"JAX backend:\", jax.default_backend(), \"devices:\", jax.devices())' &&
        exec bash -l
      "
